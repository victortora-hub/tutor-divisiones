<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor de Divisiones Tradicional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0fdf4;
            background-image: radial-gradient(#bbf7d0 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .math-board-container {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: #1e293b;
            margin: 2rem 0;
            padding: 2rem;
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border: 4px solid #4ade80;
            overflow-x: auto;
        }

        .grid-area {
            display: grid;
            /* Columnas dinámicas generadas en JS */
            grid-auto-rows: 50px;
            gap: 0px; /* Sin espacio para que las líneas formen la caja continua */
            position: relative;
        }

        .cell {
            width: 40px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            z-index: 1;
        }

        /* La "Caja" o "Casita" tradicional Española / Latina */
        .bracket-spain-left {
            border-left: 4px solid #3b82f6;
        }
        .bracket-spain-bottom {
            border-bottom: 4px solid #3b82f6;
        }

        /* Línea de resta */
        .line-bottom {
            border-bottom: 3px solid #94a3b8;
        }

        /* Resaltado del número que se está operando */
        .active-highlight {
            background-color: #fef08a;
            border-radius: 6px;
            box-shadow: 0 0 0 2px #fef08a; /* Expande un poco el color sin afectar el grid */
            z-index: 0;
        }

        .bring-down-arrow {
            color: #ef4444;
            font-size: 1.2rem;
            animation: bounceDown 1s infinite;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes bounceDown {
            0%, 100% { transform: translateY(-25%); }
            50% { transform: translateY(25%); }
        }

        .btn-ludico {
            transition: all 0.2s;
            box-shadow: 0 4px 0px 0px rgba(0,0,0,0.2);
        }
        .btn-ludico:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px 0px rgba(0,0,0,0.2);
        }
        
        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Pantalla de Inicio -->
    <div id="setup-screen" class="max-w-md w-full bg-white rounded-3xl p-8 shadow-2xl border-4 border-blue-400 text-center">
        <h1 class="text-4xl font-black text-blue-600 mb-6 tracking-tight">¡Misión División! 🚀</h1>
        <p class="text-gray-600 mb-8 font-bold text-lg">Método Tradicional (Dividendo a la izquierda)</p>
        
        <div class="space-y-6">
            <div class="bg-blue-50 p-4 rounded-2xl border-2 border-blue-100">
                <h2 class="font-bold text-blue-800 mb-3"><i class="fas fa-dice"></i> Modo Aleatorio</h2>
                <div class="flex gap-2 justify-center">
                    <button onclick="startRandom(1)" class="btn-ludico bg-green-400 hover:bg-green-500 text-white font-bold py-2 px-4 rounded-xl">Fácil (1 cifra)</button>
                    <button onclick="startRandom(2)" class="btn-ludico bg-orange-400 hover:bg-orange-500 text-white font-bold py-2 px-4 rounded-xl">Medio (2 cifras)</button>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="h-1 bg-gray-200 flex-1 rounded-full"></div>
                <span class="text-gray-400 font-bold uppercase text-sm">O elige tus números</span>
                <div class="h-1 bg-gray-200 flex-1 rounded-full"></div>
            </div>

            <div class="bg-purple-50 p-4 rounded-2xl border-2 border-purple-100">
                <h2 class="font-bold text-purple-800 mb-3"><i class="fas fa-keyboard"></i> Modo Manual</h2>
                <div class="flex items-center justify-center gap-2 text-xl font-bold">
                    <input type="number" id="manual-dividend" placeholder="452" class="w-24 p-2 rounded-lg border-2 border-purple-300 text-center focus:outline-none focus:border-purple-500" min="10" max="9999">
                    <span class="text-purple-600 font-black px-2">|</span>
                    <input type="number" id="manual-divisor" placeholder="4" class="w-16 p-2 rounded-lg border-2 border-purple-300 text-center focus:outline-none focus:border-purple-500" min="2" max="99">
                </div>
                <button onclick="startManual()" class="mt-4 w-full btn-ludico bg-purple-500 hover:bg-purple-600 text-white font-bold py-3 px-4 rounded-xl">¡Empezar a Dividir!</button>
                <p id="setup-error" class="text-red-500 text-sm font-bold mt-2 hidden">¡Introduce números válidos!</p>
            </div>
        </div>
    </div>

    <!-- Pantalla de Juego -->
    <div id="game-screen" class="hidden w-full max-w-2xl flex flex-col items-center">
        
        <!-- Pizarra Matemática -->
        <div class="math-board-container w-full">
            <div class="grid-area" id="grid-container">
                <!-- Generado por JS -->
            </div>
        </div>

        <!-- Panel del Asistente (Bot) -->
        <div class="w-full bg-white rounded-3xl p-6 shadow-xl border-4 border-yellow-400 relative mt-4">
            <div class="absolute -top-10 left-6 bg-yellow-400 w-16 h-16 rounded-full flex items-center justify-center text-3xl border-4 border-white shadow-md">
                🤖
            </div>
            
            <h3 id="step-title" class="text-xl font-black text-yellow-600 ml-16 mb-2 uppercase tracking-wider">Paso 1: Dividir</h3>
            <p id="instruction-text" class="text-gray-700 text-lg font-bold ml-16 mb-4">
                ¿Cuántas veces cabe el X en el Y?
            </p>

            <div class="flex flex-col sm:flex-row gap-4 items-center ml-16">
                <input type="number" id="user-input" class="w-32 p-3 text-2xl font-black text-center border-4 border-gray-200 rounded-xl focus:outline-none focus:border-yellow-400 transition-colors" autocomplete="off">
                <button id="submit-btn" onclick="checkAnswer()" class="btn-ludico bg-blue-500 hover:bg-blue-600 text-white font-black py-3 px-8 rounded-xl text-lg w-full sm:w-auto">
                    Comprobar <i class="fas fa-check ml-2"></i>
                </button>
                <button id="action-btn" onclick="executeAction()" class="hidden btn-ludico bg-green-500 hover:bg-green-600 text-white font-black py-3 px-8 rounded-xl text-lg w-full sm:w-auto">
                    Bajar número <i class="fas fa-arrow-down ml-2"></i>
                </button>
            </div>
            <p id="feedback-msg" class="text-red-500 font-bold ml-16 mt-3 hidden"></p>
        </div>

        <button onclick="resetGame()" class="mt-6 text-gray-500 font-bold hover:text-gray-700 underline"><i class="fas fa-home"></i> Volver al menú principal</button>
    </div>

    <script>
        // === ESTADO DEL JUEGO ===
        let divisor = 0;
        let dividendStr = "";
        let cells = []; // { id, val, row, col, classes }
        
        let state = ""; // DIVIDE, MULTIPLY, SUBTRACT, BRING_DOWN, DONE
        let currDividendIdx = 0;
        let workingNumber = 0;
        let leftCurrentRow = 2; // Fila donde suceden las restas (debajo del dividendo)
        let quotientCol = 0;    // Columna donde se escribe el siguiente dígito del cociente
        let currentQuotientDigit = 0;
        let currentProduct = 0;
        let expectedAnswer = 0;
        let cellIdCounter = 0;

        // Contexto de Audio para efectos de sonido
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(frequency, type, duration) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = type;
            oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }
        function playSuccess() { playBeep(600, 'sine', 0.2); setTimeout(()=>playBeep(800, 'sine', 0.3), 100); }
        function playError() { playBeep(200, 'sawtooth', 0.3); }

        // === INICIALIZACIÓN ===
        function startRandom(level) {
            let div, divd;
            if (level === 1) {
                div = Math.floor(Math.random() * 8) + 2; // 2-9
                divd = Math.floor(Math.random() * 899) + 100; // 100-999
            } else {
                div = Math.floor(Math.random() * 89) + 10; // 10-99
                divd = Math.floor(Math.random() * 8999) + 1000; // 1000-9999
            }
            initGame(div, divd);
        }

        function startManual() {
            let div = parseInt(document.getElementById('manual-divisor').value);
            let divd = parseInt(document.getElementById('manual-dividend').value);
            let error = document.getElementById('setup-error');
            
            if (isNaN(div) || isNaN(divd) || div <= 0 || divd <= 0 || div > divd) {
                error.classList.remove('hidden');
                return;
            }
            error.classList.add('hidden');
            initGame(div, divd);
        }

        function initGame(div, divd) {
            divisor = div;
            dividendStr = String(divd);
            cells = [];
            cellIdCounter = 0;

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            // Calculamos el ancho de la cuadrícula
            let cols = dividendStr.length + Math.max(String(divisor).length, dividendStr.length) + 1;
            document.getElementById('grid-container').style.gridTemplateColumns = `repeat(${cols}, 40px)`;

            // 1. Colocar el Dividendo a la izquierda (Fila 1)
            for(let i = 0; i < dividendStr.length; i++) {
                cells.push({
                    id: cellIdCounter++,
                    val: dividendStr[i],
                    row: 1,
                    col: i + 1,
                    classes: "text-2xl"
                });
            }

            // 2. Colocar el Divisor a la derecha (Fila 1), con la "caja"
            let divStr = String(divisor);
            let divisorStartCol = dividendStr.length + 1;
            
            for(let i = 0; i < divStr.length; i++) {
                let cellClasses = "text-2xl text-blue-600 bracket-spain-bottom";
                if (i === 0) cellClasses += " bracket-spain-left";
                
                cells.push({
                    id: cellIdCounter++,
                    val: divStr[i],
                    row: 1,
                    col: divisorStartCol + i,
                    classes: cellClasses
                });
            }

            currDividendIdx = 0;
            workingNumber = parseInt(dividendStr[0]);

            // Si el primer número es menor que el divisor, tomamos dos cifras
            if (workingNumber < divisor && dividendStr.length > 1) {
                currDividendIdx = 1;
                workingNumber = parseInt(dividendStr.substring(0, 2));
            }

            leftCurrentRow = 2;
            quotientCol = divisorStartCol;
            
            setState('DIVIDE');
            renderBoard();
        }

        function resetGame() {
            document.getElementById('setup-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
        }

        // === MOTOR DE RENDERIZADO ===
        function renderBoard() {
            const container = document.getElementById('grid-container');
            container.innerHTML = "";

            cells.forEach(c => {
                let div = document.createElement('div');
                div.className = `cell ${c.classes}`;
                div.style.gridRow = c.row;
                div.style.gridColumn = `${c.col} / ${c.col + 1}`;
                
                if (c.val === '↓') {
                    div.innerHTML = `<i class="fas fa-arrow-down bring-down-arrow"></i>`;
                } else {
                    div.innerText = c.val;
                }
                
                container.appendChild(div);
            });
        }

        function addNumberToGrid(num, row, endCol, customClass = "") {
            let strNum = String(num);
            for (let i = 0; i < strNum.length; i++) {
                let digit = strNum[strNum.length - 1 - i];
                cells.push({
                    id: cellIdCounter++,
                    val: digit,
                    row: row,
                    col: endCol - i,
                    classes: customClass
                });
            }
        }

        function clearHighlights() {
            cells.forEach(c => {
                c.classes = c.classes.replace('active-highlight', '').trim();
            });
        }

        function highlightWorkingNumber(row, endCol, length) {
            cells.forEach(c => {
                if (c.row === row && c.col > endCol - length && c.col <= endCol) {
                    if (!c.classes.includes('active-highlight')) {
                        c.classes += ' active-highlight';
                    }
                }
            });
        }

        // === MÁQUINA DE ESTADOS ===
        function setState(newState) {
            state = newState;
            clearHighlights();
            
            const title = document.getElementById('step-title');
            const inst = document.getElementById('instruction-text');
            const input = document.getElementById('user-input');
            const btnSubmit = document.getElementById('submit-btn');
            const btnAction = document.getElementById('action-btn');
            const feedback = document.getElementById('feedback-msg');
            
            feedback.classList.add('hidden');
            input.value = "";
            input.classList.remove('hidden');
            btnSubmit.classList.remove('hidden');
            btnAction.classList.add('hidden');
            input.focus();

            switch(state) {
                case 'DIVIDE':
                    title.innerText = "Paso 1: Dividir ➗";
                    title.className = "text-xl font-black text-blue-600 ml-16 mb-2 uppercase tracking-wider";
                    inst.innerHTML = `¿Cuántas veces cabe el <span class="text-blue-600 font-black">${divisor}</span> en el <span class="text-blue-600 font-black">${workingNumber}</span>?`;
                    expectedAnswer = Math.floor(workingNumber / divisor);
                    
                    let targetRow = (leftCurrentRow === 2) ? 1 : leftCurrentRow - 1;
                    highlightWorkingNumber(targetRow, currDividendIdx + 1, String(workingNumber).length);
                    break;

                case 'MULTIPLY':
                    title.innerText = "Paso 2: Multiplicar ✖️";
                    title.className = "text-xl font-black text-purple-600 ml-16 mb-2 uppercase tracking-wider";
                    inst.innerHTML = `Multiplica <span class="text-purple-600 font-black">${currentQuotientDigit}</span> x <span class="text-purple-600 font-black">${divisor}</span>.`;
                    expectedAnswer = currentQuotientDigit * divisor;
                    
                    highlightWorkingNumber(2, quotientCol - 1, 1);
                    break;

                case 'SUBTRACT':
                    title.innerText = "Paso 3: Restar ➖";
                    title.className = "text-xl font-black text-red-600 ml-16 mb-2 uppercase tracking-wider";
                    inst.innerHTML = `Resta <span class="text-red-600 font-black">${workingNumber}</span> - <span class="text-red-600 font-black">${currentProduct}</span>.`;
                    expectedAnswer = workingNumber - currentProduct;
                    
                    highlightWorkingNumber(leftCurrentRow - 1, currDividendIdx + 1, String(workingNumber).length);
                    break;

                case 'BRING_DOWN':
                    title.innerText = "Paso 4: Bajar cifra ⬇️";
                    title.className = "text-xl font-black text-green-600 ml-16 mb-2 uppercase tracking-wider";
                    let nextDigit = dividendStr[currDividendIdx + 1];
                    inst.innerHTML = `¡Bien! Ahora baja la siguiente cifra: <span class="text-green-600 font-black">${nextDigit}</span>.`;
                    
                    input.classList.add('hidden');
                    btnSubmit.classList.add('hidden');
                    btnAction.classList.remove('hidden');
                    
                    // Aseguramos qué estilo de botón se muestra (Verde para Bajar)
                    btnAction.className = "btn-ludico bg-green-500 hover:bg-green-600 text-white font-black py-3 px-8 rounded-xl text-lg w-full sm:w-auto";
                    btnAction.innerHTML = `Bajar el ${nextDigit} <i class="fas fa-arrow-down ml-2"></i>`;
                    
                    highlightWorkingNumber(1, currDividendIdx + 2, 1);
                    break;

                case 'DONE':
                    title.innerText = "¡Misión Cumplida! 🏆";
                    title.className = "text-xl font-black text-yellow-500 ml-16 mb-2 uppercase tracking-wider";
                    let finalRemainder = workingNumber - currentProduct;
                    
                    let qCells = cells.filter(c => c.row === 2 && c.col >= dividendStr.length + 1).sort((a,b) => a.col - b.col);
                    let finalQuotient = qCells.map(c => c.val).join('');

                    inst.innerHTML = `El cociente es <span class="text-yellow-600 font-black">${finalQuotient}</span> y el resto es <span class="text-yellow-600 font-black">${finalRemainder}</span>.`;
                    
                    input.classList.add('hidden');
                    btnSubmit.classList.add('hidden');
                    btnAction.classList.remove('hidden');
                    
                    // Ajustamos el botón visualmente para "Jugar de nuevo"
                    btnAction.className = "btn-ludico bg-blue-500 hover:bg-blue-600 text-white font-black py-3 px-8 rounded-xl text-lg w-full sm:w-auto";
                    btnAction.innerHTML = `Jugar de nuevo <i class="fas fa-redo ml-2"></i>`;
                    
                    triggerConfetti();
                    break;
            }
            renderBoard();
        }

        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !this.classList.contains('hidden')) {
                checkAnswer();
            }
        });

        function checkAnswer() {
            const inputEl = document.getElementById('user-input');
            const feedback = document.getElementById('feedback-msg');
            let userAns = parseInt(inputEl.value);

            if (isNaN(userAns)) return;

            if (userAns === expectedAnswer) {
                playSuccess();
                feedback.classList.add('hidden');
                avanzarPaso();
            } else {
                playError();
                inputEl.classList.add('shake');
                setTimeout(() => inputEl.classList.remove('shake'), 400);
                feedback.innerText = "¡Uy! Inténtalo de nuevo. 🤔";
                feedback.classList.remove('hidden');
                inputEl.value = "";
                inputEl.focus();
            }
        }

        function avanzarPaso() {
            switch(state) {
                case 'DIVIDE':
                    currentQuotientDigit = expectedAnswer;
                    addNumberToGrid(currentQuotientDigit, 2, quotientCol, 'text-blue-600 font-black text-2xl');
                    quotientCol++;
                    setState('MULTIPLY');
                    break;

                case 'MULTIPLY':
                    currentProduct = expectedAnswer;
                    addNumberToGrid(currentProduct, leftCurrentRow, currDividendIdx + 1, 'text-purple-600 line-bottom font-bold text-xl');
                    leftCurrentRow++;
                    setState('SUBTRACT');
                    break;

                case 'SUBTRACT':
                    let remainder = expectedAnswer;
                    
                    if (currDividendIdx < dividendStr.length - 1) {
                        addNumberToGrid(remainder, leftCurrentRow, currDividendIdx + 1, 'text-red-600 font-bold text-xl');
                        setState('BRING_DOWN');
                    } else {
                        addNumberToGrid(remainder, leftCurrentRow, currDividendIdx + 1, 'text-yellow-500 font-black text-2xl');
                        setState('DONE');
                    }
                    break;
            }
        }

        // Esta es la función clave corregida.
        // Ahora evalúa el estado actual para saber qué acción ejecutar,
        // sin necesidad de sobrescribir el evento onclick en el botón.
        function executeAction() {
            if (state === 'BRING_DOWN') {
                playSuccess();
                
                let arrowCol = currDividendIdx + 2;
                let arrowRow = leftCurrentRow - 1; 

                cells.push({
                    id: cellIdCounter++,
                    val: '↓',
                    row: arrowRow,
                    col: arrowCol,
                    classes: 'text-red-300'
                });

                currDividendIdx++;
                let broughtDownDigit = dividendStr[currDividendIdx];
                addNumberToGrid(broughtDownDigit, leftCurrentRow, currDividendIdx + 1, 'text-green-600 font-bold text-xl');
                
                let remainderCells = cells.filter(c => c.row === leftCurrentRow && c.col <= currDividendIdx + 1 && c.val !== '↓');
                remainderCells.sort((a,b) => a.col - b.col);
                let newNumStr = remainderCells.map(c => c.val).join('');
                workingNumber = parseInt(newNumStr);

                leftCurrentRow++;
                setState('DIVIDE');
                
            } else if (state === 'DONE') {
                resetGame();
            }
        }

        function triggerConfetti() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);

                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
                }));
                confetti(Object.assign({}, defaults, { particleCount,
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
                }));
            }, 250);
        }
    </script>
</body>
</html>
